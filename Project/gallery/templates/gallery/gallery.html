{% extends "base.html" %}
{% load static %}




{% block content %}
	
	
	<style>
		.square-container {
			position: relative;
			width: 100%; 
			padding-top: 100%; /* 1:1 aspect ratio */
			overflow: hidden;
			box-sizing: border-box;
		}

		.square-container img {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			object-fit: cover;
		}
	</style>
	
	
	
	
	
	
	<!-- Modify Gallery Button -->
	<a href="{% url 'gallery_edit' gallery.id %}">
		<button class="btn btn-lg btn-primary position-fixed bottom-0 end-0 m-5" style="z-index: 100;">
			Modify the gallery images
		</button>
	</a>
	
	
	<!-- Breadcrumbs -->
	<div class="mt-3"></div>
	<nav aria-label="breadcrumb mt-3">
		<ol class="breadcrumb justify-content-center">
			<li class="breadcrumb-item"><a href="{% url 'index' %}">Home</a></li>
			<li class="breadcrumb-item active" aria-current="page">Gallery {{ gallery.title }}</li>
		</ol>
	</nav>
	<!-- Breadcrumbs END -->
	
	
	<!-- Gallery Header -->
	<div class="container-fluid">
		<div class="cpt-5 px-xxl-5 pb-3">
			
			<!-- Header -->
			<div class="text-center pb-3 mt-5">
				<h6 class="text-primary text-uppercase" style="letter-spacing: 5px;">Gallery</h6>
				<h1>Here are the picture of the gallery {{ gallery.title }}</h1>
			</div>
			
		</div>
	</div>
	
	
	<!-- Images -->
	<div class="container">
		<div class="row">
		
			{% for image in images %}
				
				<!-- Images -->
				<div class="col-lg-3 col-sm-4 col-6 p-1">
					<a href="#" class="portfolio-link" data-bs-toggle="modal" data-index="{{ forloop.counter0 }}" data-image-url="{{ image.image.url }}" onclick="openImageModal(this)">
						<div class="rounded square-container zoom-in">
							<img class="" src="{{ image.image.url }}">
						</div>
					</a>
				</div>
				
			{% endfor %}
			
		</div>
	</div>
	
	
	
	
	
	
{% endblock %}
